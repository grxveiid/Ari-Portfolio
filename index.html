<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-cu4UZFdn4xZVqaR91seo7v9mveRiuBkt0tU4YQeZQev2Kjoiu7uPRE1F0B46l0c9" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/INICIO.CSS">
</head>
<body>
    <main class="main">
        <section class="hero-banner">
            <div class="container">
                <div class="text-center mb-5">
                    <h1 class="hero-title">Ari Alfallo</h1>
                    <h3 class="hero-subtitle">Illustration and multimedia portfolio</h3>
                </div>

                <div class="hero-layout">
                    <div class="hero-image-placeholder d-flex align-items-center justify-content-center">
                        <img src="img/ariiiii.PNG" alt="Image placeholder" class="img-fluid rounded-4 shadow-lg hero-image">
                   <div class="icon-grid" id="iconGrid">
    <a href="sobremi.html" class="text-decoration-none">
        <div class="icon-card">
            <span class="icon-label">About Me</span>
        </div>
    </a>
    <a href="illustration.html" class="text-decoration-none">
        <div class="icon-card">
            <span class="icon-label">Illustration</span>
        </div>
    </a>
    <a href="multimedia.html" class="text-decoration-none">
        <div class="icon-card">
            <span class="icon-label">Photography</span>
        </div>
    </a>
</div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+YkgKk3oYt+K3V7E6t/6shte5S4Xb" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/Draggable.min.js"></script>
    <script>


    <!--Animaciones con GSAP-->
        gsap.registerPlugin(ScrollTrigger, Draggable);

        gsap.from('.hero-title', {opacity: 0, y: 60, duration: 1.1, ease: 'power3.out'});
        gsap.from('.hero-layout', {opacity: 0, y: 60, duration: 1.1, ease: 'power3.out'});
        gsap.from('.hero-subtitle', {opacity: 0, y: 60, duration: 1.1, ease: 'power3.out', delay: 0.1});
        gsap.utils.toArray('.icon-card').forEach((card, index) => {
            gsap.from(card, {opacity: 0, y: 30, duration: 0.8, delay: 0.18 + index * 0.1, ease: 'power3.out'});
        });

        
        

        const cards = document.querySelectorAll('.icon-card');
        const grid = document.getElementById('iconGrid');
        const maxDist = 260;

        grid.addEventListener('mousemove', event => {
            const rect = grid.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            cards.forEach(card => {
                const cardRect = card.getBoundingClientRect();
                const cardCenterX = cardRect.left - rect.left + cardRect.width / 2;
                const cardCenterY = cardRect.top - rect.top + cardRect.height / 2;
                const distance = Math.hypot(mouseX - cardCenterX, mouseY - cardCenterY);
                const scale = gsap.utils.clamp(1, 1.15, 1.15 - (distance / maxDist) * 0.15);
                gsap.to(card, {scale, duration: 0.24, ease: 'power3.out'});
            });
        });

        grid.addEventListener('mouseleave', () => {
            gsap.to(cards, {scale: 1, duration: 0.3, ease: 'power3.out'});
        });
    </script>
</body>
</html>
